<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>節奏練習器 - Studio Edition v11</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0e14">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="節奏練習器">
    <link rel="apple-touch-icon" href="images/icon-192.png">
    
    <script src="lib/react.min.js"></script>
    <script src="lib/react-dom.min.js"></script>
    <script src="lib/babel.min.js"></script>
    <script src="lib/tone.js"></script>

    <style>
        :root {
            --bg-dark: #0a0e14;
            --card-bg: rgba(255, 255, 255, 0.03);
            --primary-neon: #00f5d4;
            --text-main: #f0f0f0;
            --text-dim: #7f8c8d;
            --accent-red: #ff4757;
            --border-glow: rgba(0, 245, 212, 0.2);
        }

        body {
            margin: 0; padding: 0;
            background: var(--bg-dark); color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100dvh; overflow: hidden;
        }

        #root { width: 100%; max-width: 1100px; padding: 8px; height: 100%; display: flex; align-items: center; justify-content: center; }

        .container {
            background: linear-gradient(145deg, #16213e, #0f172a);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 12px;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            width: 100%;
            max-height: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header { margin-bottom: 12px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); padding-bottom: 8px; flex-shrink: 0; }
        .studio-branding { display: flex; flex-direction: column; gap: 2px; line-height: 1.1; }
        .brand-main { font-size: 1.15rem; color: var(--primary-neon); font-weight: 900; letter-spacing: 2px; text-shadow: 0 0 15px var(--border-glow); }
        .brand-sub { font-size: 0.75rem; color: var(--text-dim); font-weight: 700; letter-spacing: 4px; text-transform: uppercase; }

        /* RHYTHM DISPLAY GRID */
        .rhythm-grid {
            display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px;
            background: rgba(0,0,0,0.4); padding: 12px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: inset 0 0 40px rgba(0,0,0,0.5);
            flex: 1.2;
            min-height: 0;
            justify-content: center;
        }

        .rhythm-row { display: flex; gap: 8px; justify-content: center; position: relative; }

        .block-slot {
            flex: 1; aspect-ratio: 16/10; max-width: 240px;
            background: rgba(255,255,255,0.01); border-radius: 10px;
            display: flex; justify-content: center; align-items: center;
            position: relative; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.08);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            max-height: 15vh;
        }

        .block-slot img { width: 88%; height: auto; filter: invert(1) brightness(1.2); transition: all 0.2s; }

        .block-slot.active { 
            border-color: var(--primary-neon); 
            background: rgba(0, 245, 212, 0.1);
            box-shadow: 0 0 25px var(--border-glow);
        }
        .block-slot.active img { transform: scale(1.08); filter: invert(1) brightness(1.6) drop-shadow(0 0 8px var(--primary-neon)); }
        .block-slot.dimmed { opacity: 0.1; }

        .count-in-text {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            font-size: 8rem; font-weight: 900; color: var(--primary-neon);
            text-shadow: 0 0 40px var(--primary-neon); z-index: 100; pointer-events: none;
        }

        /* STUDIO CONTROL SELECTOR */
        .control-panel {
            display: flex; gap: 10px; margin-bottom: 0px;
            flex: 1;
            min-height: 0;
        }

        .control-section {
            flex: 1; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 12px; padding: 8px; text-align: left;
        }

        .visual-selector { display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px; }
        .visual-selector.wide { grid-template-columns: repeat(6, 1fr); gap: 4px; }

        .icon-btn {
            background: rgba(255,255,255,0.03); border: 2px solid rgba(255,255,255,0.1);
            border-radius: 8px; padding: 2px; cursor: pointer; transition: all 0.2s;
            display: flex; justify-content: center; align-items: center; aspect-ratio: 1/1;
            max-width: 60px;
        }

        .icon-btn img { width: 90%; height: auto; filter: invert(1) opacity(0.3); transition: all 0.2s; }

        .icon-btn:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.2); }
        .icon-btn.active { border-color: var(--primary-neon); background: rgba(0, 245, 212, 0.12); box-shadow: 0 0 15px rgba(0, 245, 212, 0.15); }
        .icon-btn.active.is-rest { border-color: var(--accent-red); background: rgba(255, 71, 87, 0.12); box-shadow: 0 0 15px rgba(255, 71, 87, 0.15); }
        
        .icon-btn.active img { filter: invert(1) opacity(1) brightness(1.3); }

        /* PLAYBACK CONTROLS */
        .master-controls { 
            display: flex; gap: 10px; align-items: stretch; justify-content: center; 
            padding: 10px; background: rgba(0,0,0,0.2); border-radius: 12px; 
            flex-shrink: 0; width: 140px; flex-direction: column;
        }
        .bpm-station { text-align: center; width: 100%; }
        .bpm-station .val { font-size: 1.2rem; font-weight: 900; color: var(--primary-neon); display: flex; align-items: baseline; gap: 4px; justify-content: center; }
        .bpm-station .label { font-size: 0.5rem; color: var(--text-dim); text-transform: uppercase; font-weight: 600; }

        input[type=range] { width: 100%; height: 3px; background: rgba(255,255,255,0.1); border-radius: 2px; appearance: none; cursor: pointer; margin-top: 5px; }
        input[type=range]::-webkit-slider-thumb { appearance: none; width: 16px; height: 16px; background: var(--primary-neon); border-radius: 50%; border: 3px solid #16213e; }

        .action-group { display: flex; gap: 8px; flex-direction: column; width: 100%; }

        button.control-btn {
            padding: 10px 8px; font-size: 0.65rem; font-weight: 900;
            border-radius: 10px; cursor: pointer; border: none;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase; letter-spacing: 1px;
            width: 100%;
        }

        .btn-random { background: rgba(255,255,255,0.08); color: var(--text-main); border: 1px solid rgba(255,255,255,0.1); }
        .btn-random:hover { background: rgba(255,255,255,0.15); transform: translateY(-2px); }
        
        .btn-play { background: var(--primary-neon); color: black; min-width: auto; box-shadow: 0 10px 20px rgba(0, 245, 212, 0.2); }
        .btn-play:hover { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(0, 245, 212, 0.3); }
        .btn-play.playing { background: var(--accent-red); color: white; box-shadow: 0 10px 20px rgba(255, 71, 87, 0.2); }

        footer { margin-top: 10px; color: var(--text-dim); font-size: 0.6rem; display: flex; justify-content: center; gap: 30px; flex-shrink: 0; }
        .pill { background: rgba(255,255,255,0.03); color: var(--text-main); padding: 2px 10px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); }

        /* NEW LAYOUT CONTAINERS */
        .studio-main { display: flex; flex-direction: column; gap: 10px; width: 100%; flex: 1; min-height: 0; }
        .side-bar { display: flex; flex-direction: row; gap: 10px; scrollbar-gutter: stable; flex: 0.8; min-height: 0; align-items: stretch; }

        /* RESPONSIVE LANDSCAPE OPTIMIZATION */
        @media screen and (orientation: landscape) and (max-height: 600px) {
            body { padding: 5px; overflow-y: auto; height: auto; align-items: flex-start; }
            #root { max-width: 100%; padding: 0; }
            .container { padding: 5px 10px; border-radius: 16px; max-height: none; min-height: 96vh; box-shadow: none; display: flex; flex-direction: column; }
            header { display: block; margin-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 5px; }
            .studio-branding { flex-direction: row; justify-content: space-between; align-items: baseline; gap: 15px; }
            .brand-main { font-size: 1.0rem; }
            .brand-sub { font-size: 0.65rem; letter-spacing: 2px; }
            footer { display: none; }
            
            .studio-main { display: grid; grid-template-columns: 1fr 260px; gap: 15px; flex: 1; min-height: 0; }
            .rhythm-grid { margin-bottom: 0; padding: 10px; min-width: 0; overflow: hidden; }
            .side-bar { 
                width: 260px; min-width: 260px; max-width: 260px; 
                flex-shrink: 0; overflow-y: auto; overflow-x: hidden; 
                max-height: 85vh; padding-right: 5px; 
                display: flex; flex-direction: column; gap: 15px; 
                align-items: stretch; border-left: 1px solid rgba(255,255,255,0.03); 
                touch-action: pan-y;
                -webkit-overflow-scrolling: touch;
            }
            
            .control-panel { flex: none; gap: 10px; margin-bottom: 0; }
            .control-section { padding: 8px; }
            .visual-selector { grid-template-columns: repeat(3, 1fr); gap: 4px; }
            .visual-selector.wide { grid-template-columns: repeat(4, 1fr); gap: 4px; }
            
            .master-controls { flex: none; flex-direction: column; gap: 10px; padding: 12px; align-items: center; border-radius: 12px; margin-left: 0; width: 100%; box-sizing: border-box; }
            .bpm-station { width: 100%; text-align: center; }
            .bpm-station .val { justify-content: center; font-size: 1.4rem; gap: 4px; }
            .bpm-station .label { font-size: 0.6rem; }
            input[type=range] { height: 3px; }
            input[type=range]::-webkit-slider-thumb { width: 16px; height: 16px; }

            .action-group { width: 100%; flex-direction: column; gap: 8px; }
            button.control-btn { padding: 10px 8px; font-size: 0.65rem; width: 100%; letter-spacing: 1px; min-width: auto; }
        }
    </style>
</head>

                        setCountIn(4 - c);
                        player.current.playbackRate = c === 0 ? 1.2 : 1.0;
                        if (player.current.loaded) player.current.start(time);
                    } else if (c < 20) {
                        setCountIn(null);
                        const playBeat = c - 4;
                        player.current.playbackRate = playBeat % 4 === 0 ? 1.5 : 1.0;
                        if (player.current.loaded) player.current.start(time);
                        Tone.Draw.schedule(() => setActiveBeat(playBeat), time);
                    } else {
                        // AUTO STOP AFTER ONE ROUND
                        Tone.Draw.schedule(() => stopPlayback(), time);
                    }
                    c++;
                }, "4n");
                
                Tone.Transport.start("+0.1");
            };

            const stopPlayback = () => {
                Tone.Transport.stop(); Tone.Transport.cancel();
                setIsPlaying(false); setActiveBeat(-1); setCountIn(null);
            };

            return (
                <div className="container">
                    <header>
                        <div className="studio-branding">
                            <div className="brand-main">張志宇薩克斯風教室</div>
                            <div className="brand-sub">節奏練習器</div>
                        </div>
                    </header>

                    <main className="studio-main">
                        <div className="rhythm-grid">
                            {countIn && <div className="count-in-text">{countIn}</div>}
                            {[0, 1, 2, 3].map(rowIdx => (
                                <div key={rowIdx} className="rhythm-row">
                                    {sequence.slice(rowIdx * 4, (rowIdx + 1) * 4).map((item, i) => {
                                        const actualIdx = rowIdx * 4 + i;
                                        return (
                                            <div key={actualIdx} className={`block-slot ${countIn ? 'dimmed' : ''} ${activeBeat === actualIdx ? 'active' : ''}`}>
                                                <img src={item.src} alt={item.label} />
                                            </div>
                                        );
                                    })}
                                </div>
                            ))}
                        </div>

                        <aside className="side-bar">
                            <div className="control-panel">
                                <div className="control-section">
                                    <div className="visual-selector wide">
                                        {ALL_ELIGIBLE.map(f => {
                                            const isRest = REST_WHITELIST.includes(f);
                                            return (
                                                <div key={f} className={`icon-btn ${isRest ? 'is-rest' : ''} ${selectedFiles.has(f) ? 'active' : ''}`} onClick={() => toggleFile(f)}>
                                                    <img src={`images/${f}`} alt={f} />
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            </div>

                            <div className="master-controls">
                                <div className="bpm-station">
                                    <div className="val">{bpm}<span className="label">BPM</span></div>
                                    <input type="range" min="40" max="220" value={bpm} onChange={(e) => setBpm(parseInt(e.target.value))} />
                                </div>
                                
                                <div className="action-group">
                                    <button className="control-btn btn-random" onClick={generateRandomPattern}>隨機生成</button>
                                    <button className={`control-btn btn-play ${isPlaying ? 'playing' : ''}`} onClick={() => isPlaying ? stopPlayback() : startPlayback()}>
                                        {isPlaying ? 'STOP' : 'PLAY'}
                                    </button>
                                </div>
                            </div>
                        </aside>
                    </main>

                    <footer>
                        <span>RHYTHM POOL: <span className="pill">{selectedFiles.size} Active</span></span>
                        <span>SINGLE-PLAY MODE <span className="pill">{isPlaying ? 'LIVE' : 'IDLE'}</span></span>
                    </footer>
                </div>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker registered!'))
                    .catch(err => console.log('Service Worker registration failed:', err));
            });
        }
    </script>
</body>
</html>
