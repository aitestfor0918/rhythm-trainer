<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>節奏練習器 - Slim Studio Edition</title>
    
    <script src="lib/react.min.js"></script>
    <script src="lib/react-dom.min.js"></script>
    <script src="lib/babel.min.js"></script>
    <script src="lib/tone.js"></script>

    <style>
        :root {
            --bg-dark: #0a0e14;
            --card-bg: rgba(255, 255, 255, 0.03);
            --primary-neon: #00f5d4;
            --text-main: #f0f0f0;
            --text-dim: #7f8c8d;
            --accent-red: #ff4757;
            --border-glow: rgba(0, 245, 212, 0.2);
        }

        body {
            margin: 0; padding: 0;
            background: var(--bg-dark); color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow: hidden;
        }

        #root { width: 100%; max-width: 980px; padding: 20px 10px; }

        .container {
            background: linear-gradient(145deg, #16213e, #0f172a);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 20px 30px;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            margin: auto;
        }

        header { margin-bottom: 20px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); padding-bottom: 15px; }
        h1 { font-size: 0.8rem; letter-spacing: 6px; color: var(--text-dim); margin: 0; text-transform: uppercase; font-weight: 800; }

        .rhythm-grid {
            display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px;
            background: rgba(0,0,0,0.4); padding: 15px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: inset 0 0 40px rgba(0,0,0,0.5);
        }

        .rhythm-row { display: flex; gap: 8px; justify-content: center; position: relative; }

        .block-slot {
            flex: 1; aspect-ratio: 16/10; max-width: 170px;
            background: rgba(255,255,255,0.01); border-radius: 10px;
            display: flex; justify-content: center; align-items: center;
            position: relative; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.08);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .block-slot img { width: 88%; height: auto; filter: invert(1) brightness(1.2); transition: all 0.2s; }

        .block-slot.active { 
            border-color: var(--primary-neon); 
            background: rgba(0, 245, 212, 0.1);
            box-shadow: 0 0 25px var(--border-glow);
        }
        .block-slot.active img { transform: scale(1.08); filter: invert(1) brightness(1.6) drop-shadow(0 0 8px var(--primary-neon)); }
        .block-slot.dimmed { opacity: 0.1; }

        .count-in-text {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            font-size: 8rem; font-weight: 900; color: var(--primary-neon);
            text-shadow: 0 0 40px var(--primary-neon); z-index: 100; pointer-events: none;
        }

        .control-panel {
            display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px;
        }

        .control-section {
            background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px; padding: 15px; text-align: left;
        }

        .section-label {
            font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase;
            letter-spacing: 2px; font-weight: 700; display: block; margin-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 5px;
        }

        .visual-selector { display: grid; grid-template-columns: repeat(9, 1fr); gap: 6px; }

        @media (max-width: 768px) {
            .visual-selector { grid-template-columns: repeat(5, 1fr); }
            .rhythm-grid { padding: 8px; }
        }

        .icon-btn {
            background: rgba(255,255,255,0.03); border: 2px solid rgba(255,255,255,0.1);
            border-radius: 8px; padding: 4px; cursor: pointer; transition: all 0.2s;
            display: flex; justify-content: center; align-items: center; aspect-ratio: 1/1;
        }

        .icon-btn img { width: 90%; height: auto; filter: invert(1) opacity(0.3); transition: all 0.2s; }
        .icon-btn:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.2); }
        .icon-btn.active { border-color: var(--primary-neon); background: rgba(0, 245, 212, 0.12); box-shadow: 0 0 15px rgba(0, 245, 212, 0.15); }
        .icon-btn.active.is-rest { border-color: var(--accent-red); background: rgba(255, 71, 87, 0.12); box-shadow: 0 0 15px rgba(255, 71, 87, 0.15); }
        .icon-btn.active img { filter: invert(1) opacity(1) brightness(1.3); }

        .master-controls { display: flex; gap: 40px; align-items: center; justify-content: space-between; padding: 15px; background: rgba(0,0,0,0.2); border-radius: 16px; flex-wrap: wrap; }
        .bpm-station { flex: 1; min-width: 200px; text-align: left; }
        .bpm-station .val { font-size: 2.2rem; font-weight: 900; color: var(--primary-neon); display: flex; align-items: baseline; gap: 8px; }
        .bpm-station .label { font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; font-weight: 600; }

        input[type=range] { width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; appearance: none; cursor: pointer; margin-top: 5px; }
        input[type=range]::-webkit-slider-thumb { appearance: none; width: 22px; height: 22px; background: var(--primary-neon); border-radius: 50%; border: 4px solid #16213e; }

        .action-group { display: flex; gap: 12px; }

        button.control-btn {
            padding: 14px 28px; font-size: 0.85rem; font-weight: 900;
            border-radius: 12px; cursor: pointer; border: none;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase; letter-spacing: 2px;
        }

        .btn-random { background: rgba(255,255,255,0.08); color: var(--text-main); border: 1px solid rgba(255,255,255,0.1); }
        .btn-play { background: var(--primary-neon); color: black; min-width: 140px; box-shadow: 0 10px 20px rgba(0, 245, 212, 0.2); }
        .btn-play.playing { background: var(--accent-red); color: white; }

        footer { margin-top: 20px; color: var(--text-dim); font-size: 0.65rem; display: flex; justify-content: center; gap: 40px; padding-bottom: 20px; }
        .pill { background: rgba(255,255,255,0.03); color: var(--text-main); padding: 2px 12px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        // SLIM WEB MANIFEST: Just the 22 essential patterns
        window.RHYTHM_FILES = [
            "a1.gif", "a2.gif", "a3.gif", "a4.gif", "a5.gif", "a6.gif", "a7.gif", "a8.gif", "a9.gif",
            "a11.gif", "a21.gif", "a22.gif", "a43.gif", "a51.gif", "a91.gif", "a92.gif", "a93.gif", "a31.gif", "a32.gif", "a33.gif", "a34.gif", "a62.gif"
        ];
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const AUDIO_PATH = "sound/vbeep.wav";

        const App = () => {
            const [sequence, setSequence] = useState([]);
            const [isPlaying, setIsPlaying] = useState(false);
            const [bpm, setBpm] = useState(120);
            const [activeBeat, setActiveBeat] = useState(-1);
            const [countIn, setCountIn] = useState(null);
            
            const PURE_FILES = ["a1.gif", "a2.gif", "a3.gif", "a4.gif", "a5.gif", "a6.gif", "a7.gif", "a8.gif", "a9.gif"];
            const REST_WHITELIST = ["a11.gif", "a21.gif", "a22.gif", "a43.gif", "a51.gif", "a91.gif", "a92.gif", "a93.gif", "a31.gif", "a32.gif", "a33.gif", "a34.gif", "a62.gif"];
            const ALL_ELIGIBLE = [...PURE_FILES, ...REST_WHITELIST];
            const [selectedFiles, setSelectedFiles] = useState(new Set(PURE_FILES));

            const player = useRef(null);
            const patterns = window.RHYTHM_FILES;

            useEffect(() => {
                player.current = new Tone.Player({ url: AUDIO_PATH }).toDestination();
                generateRandomPattern();
                return () => { stopPlayback(); };
            }, []);

            useEffect(() => { generateRandomPattern(); }, [selectedFiles]);
            useEffect(() => { Tone.Transport.bpm.value = bpm; }, [bpm]);

            const generateRandomPattern = () => {
                const pool = ALL_ELIGIBLE.filter(f => selectedFiles.has(f));
                if (pool.length === 0) { setSequence([]); return; }

                const newSeq = Array.from({ length: 16 }, () => {
                    const f = pool[Math.floor(Math.random() * pool.length)];
                    return { src: `images/${f}`, label: f };
                });
                setSequence(newSeq);
                if (isPlaying) stopPlayback();
            };

            const toggleFile = (file) => {
                const newSet = new Set(selectedFiles);
                if (newSet.has(file)) newSet.delete(file);
                else newSet.add(file);
                setSelectedFiles(newSet);
            };

            const startPlayback = async () => {
                if (sequence.length === 0) return;
                if (Tone.context.state !== 'running') await Tone.start();
                
                Tone.Transport.stop(); Tone.Transport.cancel();
                Tone.Transport.bpm.value = bpm;
                setIsPlaying(true);
                
                let c = 0;
                Tone.Transport.scheduleRepeat((time) => {
                    if (c < 4) {
                        setCountIn(4 - c);
                        player.current.playbackRate = c === 0 ? 1.2 : 1.0;
                        if (player.current.loaded) player.current.start(time);
                    } else if (c < 20) {
                        setCountIn(null);
                        const playBeat = c - 4;
                        player.current.playbackRate = playBeat % 4 === 0 ? 1.5 : 1.0;
                        if (player.current.loaded) player.current.start(time);
                        Tone.Draw.schedule(() => setActiveBeat(playBeat), time);
                    } else {
                        Tone.Draw.schedule(() => stopPlayback(), time);
                    }
                    c++;
                }, "4n");
                
                Tone.Transport.start("+0.1");
            };

            const stopPlayback = () => {
                Tone.Transport.stop(); Tone.Transport.cancel();
                setIsPlaying(false); setActiveBeat(-1); setCountIn(null);
            };

            return (
                <div className="container">
                    <header>
                        <h1>RHYTHM STUDIO • SLIM WEB</h1>
                    </header>

                    <div className="rhythm-grid">
                        {countIn && <div className="count-in-text">{countIn}</div>}
                        {[0, 1, 2, 3].map(rowIdx => (
                            <div key={rowIdx} className="rhythm-row">
                                {sequence.slice(rowIdx * 4, (rowIdx + 1) * 4).map((item, i) => {
                                    const actualIdx = rowIdx * 4 + i;
                                    return (
                                        <div key={actualIdx} className={`block-slot ${countIn ? 'dimmed' : ''} ${activeBeat === actualIdx ? 'active' : ''}`}>
                                            <img src={item.src} alt={item.label} />
                                        </div>
                                    );
                                })}
                            </div>
                        ))}
                    </div>

                    <div className="control-panel">
                        <div className="control-section">
                            <span className="section-label">Core Essentials</span>
                            <div className="visual-selector">
                                {PURE_FILES.map(f => (
                                    <div key={f} className={`icon-btn ${selectedFiles.has(f) ? 'active' : ''}`} onClick={() => toggleFile(f)}>
                                        <img src={`images/${f}`} alt={f} />
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="control-section">
                            <span className="section-label" style={{color:'var(--accent-red)'}}>Rest Variants</span>
                            <div className="visual-selector" style={{gridTemplateColumns:'repeat(7, 1fr)'}}>
                                {REST_WHITELIST.map(f => (
                                    <div key={f} className={`icon-btn is-rest ${selectedFiles.has(f) ? 'active' : ''}`} onClick={() => toggleFile(f)}>
                                        <img src={`images/${f}`} alt={f} />
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    <div className="master-controls">
                        <div className="bpm-station">
                            <div className="val">{bpm}<span className="label">BPM</span></div>
                            <input type="range" min="40" max="220" value={bpm} onChange={(e) => setBpm(parseInt(e.target.value))} />
                        </div>
                        
                        <div className="action-group">
                            <button className="control-btn btn-random" onClick={generateRandomPattern}>隨機生成</button>
                            <button className={`control-btn btn-play ${isPlaying ? 'playing' : ''}`} onClick={() => isPlaying ? stopPlayback() : startPlayback()}>
                                {isPlaying ? 'STOP' : 'PLAY'}
                            </button>
                        </div>
                    </div>

                    <footer>
                        <span>RHYTHM POOL: <span className="pill">{selectedFiles.size} Active</span></span>
                        <span>SLIM WEB v1.1 <span className="pill">{isPlaying ? 'LIVE' : 'IDLE'}</span></span>
                    </footer>
                </div>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
